name: AI Workflow CI/CD

on:
  push:
    branches:
      - main

jobs:

  ci:
    name: Run Automated Tests
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          python -m pytest

  cd:
    name: Build and Deploy Container App
    runs-on: ubuntu-latest
    needs: ci #this means if CI pass then only run CD

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/incident-intelligence-api:${{ github.sha }} .

      - name: Azure Container Registry Login
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/incident-intelligence-api:${{ github.sha }}

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/incident-intelligence-api:${{ github.sha }}



# What This Pipeline Does
# CI Phase
# - installs dependencies
# - runs pytest
# - validates workflow
# CD Phase
# - logs into Azure
# - builds Docker image
# - pushes image to ACR
# - deploys updated image to Container App